<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大盟文化 · DAMENG DESIGN</title>
<style>
/* ── Reset ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
img{display:block;max-width:100%}
a{color:inherit;text-decoration:none}
ul{list-style:none}

/* ── Variables ── */
:root{
  --sm-header:3rem;
  --header:3.75rem;
}

/* ── Base ── */
html{font-size:16px;-webkit-font-smoothing:antialiased;background:#fff;color:#000;}
body{font-family:"Helvetica Neue","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;min-height:100svh}

/* ── Nav ── */
nav{
  position:fixed;top:0;left:0;right:0;z-index:50;
  display:flex;justify-content:space-between;align-items:center;
  padding:0.75rem;height:var(--sm-header);
  font-size:clamp(1rem,2.5vw,1.25rem);
  letter-spacing:-0.01em;
  mix-blend-mode:difference;color:#fff;
}
nav a{transition:opacity 0.3s;opacity:1}
nav a:hover{opacity:0.3}
.nav-links{display:flex;gap:1.5rem}
@media(max-width:1023px){
  .nav-links{display:none}
}

/* ── Main Feed ── */
main{padding:0 1.25rem}
@media(min-width:1024px){
  main{padding:0 1.25rem}
  nav{height:var(--header);padding:0.9375rem 1.25rem}
}
.feed{
  display:flex;flex-direction:column;gap:1.25rem;
  width:100%;
  margin:0 auto;
  padding-top:var(--sm-header);
}
@media(min-width:1024px){
  .feed{
    padding-top:var(--header);
    gap:6.25rem;
  }
}
@media(min-width:768px){
  .feed{
    max-width:min(100%,calc((100vh - 25rem) * 1.5));
    min-width:0;
    padding-top:var(--header);
  }
}

/* ── Project Card ── */
.project{
  display:flex;flex-direction:column;
  gap:0.5rem;
}
@media(min-width:1024px){
  .project{gap:0.75rem}
}
.project-image{
  position:relative;
  overflow:hidden;
  background:#e5e5e5;
  border-radius:2px;
  box-shadow:0 0 0 1px rgba(0,0,0,0.1);
  aspect-ratio:1 / 0.6666;
}
.project-image img{
  width:100%;height:100%;
  object-fit:cover;
  transition:opacity 0.5s;
  opacity:0;
}
.project-image img.loaded{opacity:1}
.project-image .placeholder{
  position:absolute;inset:0;
  background:#d5d5d5;
  display:flex;align-items:center;justify-content:center;
  color:#aaa;font-size:clamp(0.75rem,1.5vw,0.875rem);
  letter-spacing:0.02em;
}
.project-info{display:flex;justify-content:space-between;align-items:baseline}
.project-title{font-size:clamp(0.75rem,1.5vw,0.875rem);line-height:1.3}
.project-meta{font-size:clamp(0.625rem,1.2vw,0.75rem);color:rgba(0,0,0,0.3);white-space:nowrap}

/* ── Loading ── */
.spinner{width:24px;height:24px;border:2px solid #e5e5e5;border-top-color:#999;border-radius:50%;animation:spin 0.8s linear infinite;margin:2rem auto}
@keyframes spin{to{transform:rotate(360deg)}}
.load-more{display:flex;justify-content:center;padding:2rem 0}

/* ── Footer ── */
footer{
  text-align:center;padding:3rem 1.25rem 2rem;
  font-size:0.75rem;color:rgba(0,0,0,0.3);
}
footer a{transition:opacity 0.3s}
footer a:hover{opacity:0.5}
</style>
</head>
<body>

<!-- Navigation -->
<nav>
  <a href="/">大盟文化</a>
  <div class="nav-links">
    <a href="#work">作品</a>
    <a href="#about">关于</a>
    <a href="#contact">联系</a>
  </div>
</nav>

<!-- Main Feed -->
<main>
  <div class="feed" id="feed">
    <!-- Projects loaded by JS -->
  </div>
</main>

<!-- Footer -->
<footer>
  <p>© 2025 湖南大盟文化发展有限公司 &nbsp;·&nbsp; 长沙 &nbsp;·&nbsp; 灯光设计 &nbsp;·&nbsp; 舞台美术</p>
  <p style="margin-top:0.5rem">
    <a href="mailto:www.44288183@qq.com">www.44288183@qq.com</a>
    &nbsp;·&nbsp;
    <a href="tel:18670918666">186-7091-8666</a>
  </p>
</footer>

<script>
// ── Projects data ──
const projects = [
  {title:"披荆斩棘",subtitle:"第1~5季",cat:"show"},
  {title:"乘风破浪",subtitle:"第2/5/6季",cat:"show"},
  {title:"声生不息",subtitle:"港乐季/宝岛季/家年华/大湾区季",cat:"show"},
  {title:"歌手",subtitle:"2024巅峰之夜 / 2025",cat:"show"},
  {title:"青年π计划",subtitle:"第1季",cat:"show"},
  {title:"明日之子",subtitle:"第3/4/5季",cat:"show"},
  {title:"火星情报局",subtitle:"第2/3/4/5/7季",cat:"show"},
  {title:"爱乐之都",subtitle:"第1季",cat:"show"},
  {title:"我是特优生",subtitle:"第1季",cat:"show"},
  {title:"炙热的我们",subtitle:"",cat:"show"},
  {title:"湖南卫视跨年晚会",subtitle:"2021-2022",cat:"gala"},
  {title:"B站跨年晚会",subtitle:"2021-2024",cat:"gala"},
  {title:"王者荣耀周年音乐盛典",subtitle:"2020-2025",cat:"gala"},
  {title:"和平精英总决赛中场秀",subtitle:"2022 / 2023",cat:"gala"},
  {title:"抖音直播嘉年华",subtitle:"2022",cat:"gala"},
  {title:"央视网络春晚",subtitle:"2019-2021",cat:"gala"},
  {title:"腾讯家族年年年夜饭",subtitle:"2021-2022",cat:"gala"},
  {title:"腾讯视频星光大赏",subtitle:"2023 / 2024",cat:"gala"},
  {title:"阅文IP盛典",subtitle:"2023 / 2024",cat:"gala"},
  {title:"四川卫视跨年晚会",subtitle:"2024",cat:"gala"},
  {title:"川渝春晚",subtitle:"2024",cat:"gala"},
  {title:"抖音小年夜",subtitle:"2024-2025",cat:"gala"},
  {title:"青春芒果夜",subtitle:"2024-2025",cat:"gala"},
  {title:"小芒种花夜",subtitle:"2021",cat:"gala"},
  {title:"明星大侦探新春演唱会",subtitle:"2020-2023",cat:"gala"},
  {title:"无限X青春派对巡回演唱会",subtitle:"2024-2025",cat:"gala"},
  {title:"RISE全国巡演",subtitle:"",cat:"concert"},
  {title:"李宇春·周末愉快",subtitle:"2024巡回演唱会",cat:"concert"},
  {title:"檀健次·多见一次",subtitle:"2024巡回演唱会",cat:"concert"},
  {title:"毛不易·生日演唱会",subtitle:"2024",cat:"concert"},
  {title:"刘德华·把我唱给你听",subtitle:"抖音线上演唱会",cat:"concert"},
  {title:"易烊千玺·礐壆",subtitle:"2025演唱会",cat:"concert"},
];

// ── Image config ──
// TODO: update this map with real image URLs
const images = {}; // { "披荆斩棘": "https://...", ... }

// ── Render ──
const feed = document.getElementById('feed');

function renderProject(p) {
  const div = document.createElement('div');
  div.className = 'project';
  
  const imgUrl = images[p.title] || null;
  
  div.innerHTML = `
    <div class="project-image">
      <div class="placeholder">${p.title}</div>
      ${imgUrl ? `<img src="${imgUrl}" alt="${p.title}" onload="this.classList.add('loaded')">` : ''}
    </div>
    <div class="project-info">
      <div class="project-title">${p.title}</div>
      ${p.subtitle ? `<div class="project-meta">${p.subtitle}</div>` : ''}
    </div>
  `;
  
  feed.appendChild(div);
}

projects.forEach(renderProject);

// ── Intersection Observer for lazy images ──
const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      const imgs = entry.target.querySelectorAll('img');
      imgs.forEach(img => {
        if (img.dataset.src) {
          img.src = img.dataset.src;
          img.onload = () => img.classList.add('loaded');
          delete img.dataset.src;
        }
      });
    }
  });
}, { rootMargin: '200px' });

document.querySelectorAll('.project').forEach(el => observer.observe(el));
</script>

</body>
</html>
